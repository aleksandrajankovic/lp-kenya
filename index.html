        inset: 0;
        background: linear-gradient(
          90deg,
          rgba(0, 0, 0, 0.65) 0%,
          rgba(0, 0, 0, 0.45) 25%,
          rgba(0, 0, 0, 0.2) 45%,
          rgba(0, 0, 0, 0) 65%

  <body class="min-h-screen text-white font-montserrat overflow-x-hidden">

                <div

    <!-- SCROLL HINT -->
    <div
      id="scrollHint"
      class="md:hidden fixed bottom-[93px] left-0 right-0 flex justify-center pointer-events-none z-40 transition-opacity duration-300"
    >
      <div
        class="absolute bottom-[-20px] left-0 right-0 h-32 bg-gradient-to-t from-[#050816] via-[#050816]/85 to-transparent"
      ></div>

      <div

      >

          class="w-1 h-2 bg-[#ffd21c] rounded-full mt-1 animate-bounce"
        ></div>
      </div>
    </div>

    <!-- FLOATING CTA -->
    <div
      class="fixed bottom-0 left-0 w-full p-4 bg-[#050816]/90 backdrop-blur-sm md:hidden z-50"
    >
      <a
        href="https://meridianbet.ke/en/registration"
        class="join-now block w-full text-center py-4 rounded-xl bg-[#ffd21c] text-black font-extrabold text-l tracking-[0.02em] shadow-[0_12px_30px_rgba(255,210,28,0.22)] hover:brightness-105 active:scale-[0.98] transition-all duration-200"
      >
        REGISTER
      </a>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const params = window.location.search;

        if (!params) return;

        document.querySelectorAll(".join-now").forEach(function (btn) {
          const baseUrl = btn.getAttribute("href").split("?")[0];

          btn.setAttribute("href", baseUrl + params);
        });
        const scrollHint = document.getElementById("scrollHint");

        function handleScrollHint() {
          if (!scrollHint) return;

          const scrollTop = window.scrollY;
          const windowHeight = window.innerHeight;
          const docHeight = document.documentElement.scrollHeight;

          if (scrollTop + windowHeight >= docHeight - 50) {
            scrollHint.style.opacity = "0";
          } else {
            scrollHint.style.opacity = "1";
          }
        }

        window.addEventListener("scroll", handleScrollHint);
        handleScrollHint();
      });
    </script>
